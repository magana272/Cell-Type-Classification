  <text x="380" y="526" text-anchor="middle" fill="#4A148C" font-size="11">FC(512&#x2192;64) &#x2192; ReLU &#x2192; FC(64&#x2192;512) &#x2192; &#x3C3;</text>

  <line x1="380" y1="536" x2="380" y2="548" stroke="#546E7A" stroke-width="1.2"/>
  <text x="380" y="558" text-anchor="middle" fill="#7B1FA2" font-size="10" font-weight="bold">s &#x2208; (4, 512)</text>

