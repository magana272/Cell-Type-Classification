  <text x="380" y="478" text-anchor="middle" fill="#4A148C" font-size="11">AdaptiveAvgPool1d(1) &#x2192; (4, 512)</text>

  <line x1="380" y1="488" x2="380" y2="503" stroke="#546E7A" stroke-width="1.2" marker-end="url(#arrow)"/>

