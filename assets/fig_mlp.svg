  <text x="380" y="430" text-anchor="middle" fill="#4A148C" font-size="11">unsqueeze(-1) &#x2192; (4, 512, 1)</text>

  <line x1="380" y1="440" x2="380" y2="455" stroke="#546E7A" stroke-width="1.2" marker-end="url(#arrow)"/>

